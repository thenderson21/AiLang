name: Toolkit Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    name: prepare-release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce main branch
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "Releases can only run from main." >&2
            exit 1
          fi

      - name: Compute version and tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="0.0.1-alpha.${GITHUB_RUN_NUMBER}"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "Release ${TAG}" "${GITHUB_SHA}"
            git push origin "${TAG}"
          fi

  build-gate:
    name: build-gate-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-14
          - os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC tools
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build airun (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build-airun.sh
          test -x ./tools/airun

      - name: Build airun (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/build-airun.ps1
          if (-not (Test-Path .\tools\airun.exe)) { throw 'missing tools/airun.exe' }

      - name: Runtime smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ./tools/airun run ./src/AiVM.Core/native/tests/parity_cases/vm_c_execute_src_main_params.aos --vm=c >/dev/null

      - name: Memory leak gate (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp/leak-reports
          AIVM_LEAK_CHECK_ITERATIONS=50 \
          AIVM_LEAK_MAX_GROWTH_KB=2048 \
          AIVM_LEAK_REPORT=.tmp/leak-reports/toolkit-release-${{ matrix.os }}.txt \
          ./scripts/aivm-mem-leak-check.sh ./src/AiVM.Core/native/tests/parity_cases/vm_c_execute_src_main_params.aos

      - name: Upload leak report (failed Unix run)
        if: failure() && runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: toolkit-release-leak-report-${{ matrix.os }}
          path: .tmp/leak-reports/toolkit-release-${{ matrix.os }}.txt
          if-no-files-found: ignore

      - name: Runtime smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & .\tools\airun.exe run .\src\AiVM.Core\native\tests\parity_cases\vm_c_execute_src_main_params.aos --vm=c | Out-Null
          if ($LASTEXITCODE -ne 0) { throw 'native runtime smoke failed' }

  package:
    name: package-${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    needs:
      - prepare
      - build-gate
      - package-wasm32
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            platform: linux
            arch: x64
            archive: tar.gz
            artifact_dir: .artifacts/airun-linux-x64
            frontend: aos_frontend
            airun: airun
            runtime: aivm-runtime
          - os: ubuntu-latest
            rid: linux-arm64
            platform: linux
            arch: arm64
            archive: tar.gz
            artifact_dir: .artifacts/airun-linux-arm64
            frontend: aos_frontend
            airun: airun
            runtime: aivm-runtime
          - os: macos-14
            rid: osx-x64
            platform: osx
            arch: x64
            archive: tar.gz
            artifact_dir: .artifacts/airun-osx-x64
            frontend: aos_frontend
            airun: airun
            runtime: aivm-runtime
          - os: macos-14
            rid: osx-arm64
            platform: osx
            arch: arm64
            archive: tar.gz
            artifact_dir: .artifacts/airun-osx-arm64
            frontend: aos_frontend
            airun: airun
            runtime: aivm-runtime
          - os: windows-latest
            rid: windows-x64
            platform: windows
            arch: x64
            archive: zip
            artifact_dir: .artifacts/airun-windows-x64
            frontend: aos_frontend.exe
            airun: airun.exe
            runtime: aivm-runtime.exe
            msvc_arch: amd64
          - os: windows-latest
            rid: windows-arm64
            platform: windows
            arch: arm64
            archive: zip
            artifact_dir: .artifacts/airun-windows-arm64
            frontend: aos_frontend.exe
            airun: airun.exe
            runtime: aivm-runtime.exe
            msvc_arch: amd64_arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download wasm runtime files
        uses: actions/download-artifact@v4
        with:
          name: wasm-runtime-files
          path: ./.artifacts/aivm-wasm32

      - name: Setup MSVC tools
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Setup Linux ARM64 cross toolchain
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build airun runtime (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          AIVM_AIRUN_PLATFORM="${{ matrix.platform }}" \
          AIVM_AIRUN_ARCH="${{ matrix.arch }}" \
          ./scripts/build-airun.sh

      - name: Build airun runtime (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $env:AIVM_AIRUN_ARCH = '${{ matrix.arch }}'
          ./scripts/build-airun.ps1

      - name: Build frontend parser (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./dist
          if [[ "${{ matrix.platform }}" == "linux" && "${{ matrix.arch }}" == "arm64" ]]; then
            aarch64-linux-gnu-gcc -std=c11 -O2 ./tools/aos_frontend.c -o "./dist/${{ matrix.frontend }}"
          elif [[ "${{ matrix.platform }}" == "osx" ]]; then
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              clang -std=c11 -O2 -arch x86_64 ./tools/aos_frontend.c -o "./dist/${{ matrix.frontend }}"
            else
              clang -std=c11 -O2 -arch arm64 ./tools/aos_frontend.c -o "./dist/${{ matrix.frontend }}"
            fi
          else
            cc -std=c11 -O2 ./tools/aos_frontend.c -o "./dist/${{ matrix.frontend }}"
          fi
          chmod +x "./dist/${{ matrix.frontend }}"

      - name: Build frontend parser (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\dist | Out-Null
          cl /nologo /O2 /std:c11 /Fe:.\dist\${{ matrix.frontend }} .\tools\aos_frontend.c
          Remove-Item -Force .\aos_frontend.obj -ErrorAction SilentlyContinue

      - name: Stage compiler assets (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./dist/compiler
          cp ./src/compiler/*.aos ./dist/compiler/

      - name: Stage compiler assets (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\dist\compiler | Out-Null
          Copy-Item .\src\compiler\*.aos .\dist\compiler\

      - name: Pack release artifact (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          PACKAGE_DIR="airun-${VERSION}-${{ matrix.rid }}"
          mkdir -p "${PACKAGE_DIR}"
          cp "./dist/${{ matrix.frontend }}" "${PACKAGE_DIR}/"
          test -x "./${{ matrix.artifact_dir }}/${{ matrix.airun }}"
          cp "./${{ matrix.artifact_dir }}/${{ matrix.airun }}" "${PACKAGE_DIR}/"
          test -x "./${{ matrix.artifact_dir }}/${{ matrix.runtime }}"
          cp "./${{ matrix.artifact_dir }}/${{ matrix.runtime }}" "${PACKAGE_DIR}/"
          cp -R ./dist/compiler "${PACKAGE_DIR}/compiler"
          mkdir -p "${PACKAGE_DIR}/.artifacts/aivm-wasm32"
          cp ./.artifacts/aivm-wasm32/aivm-runtime-wasm32.wasm "${PACKAGE_DIR}/.artifacts/aivm-wasm32/"
          cp ./.artifacts/aivm-wasm32/aivm-runtime-wasm32-web.wasm "${PACKAGE_DIR}/.artifacts/aivm-wasm32/"
          cp ./.artifacts/aivm-wasm32/aivm-runtime-wasm32-web.mjs "${PACKAGE_DIR}/.artifacts/aivm-wasm32/"
          ./scripts/stage-sdk-docs.sh "${PACKAGE_DIR}"
          cp ./LICENSE "${PACKAGE_DIR}/"
          tar -czf "${PACKAGE_DIR}.tar.gz" "${PACKAGE_DIR}"

      - name: Pack release artifact (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $version = '${{ needs.prepare.outputs.version }}'
          $packageDir = "airun-$version-${{ matrix.rid }}"
          New-Item -ItemType Directory -Force $packageDir | Out-Null
          Copy-Item ".\\dist\\${{ matrix.frontend }}" $packageDir
          if (-not (Test-Path ".\\${{ matrix.artifact_dir }}\\${{ matrix.airun }}")) { throw 'missing airun runtime' }
          Copy-Item ".\\${{ matrix.artifact_dir }}\\${{ matrix.airun }}" $packageDir
          if (-not (Test-Path ".\\${{ matrix.artifact_dir }}\\${{ matrix.runtime }}")) { throw 'missing minimal runtime' }
          Copy-Item ".\\${{ matrix.artifact_dir }}\\${{ matrix.runtime }}" $packageDir
          Copy-Item .\LICENSE $packageDir
          Copy-Item .\dist\compiler $packageDir -Recurse
          New-Item -ItemType Directory -Force "$packageDir\.artifacts\aivm-wasm32" | Out-Null
          Copy-Item .\.artifacts\aivm-wasm32\aivm-runtime-wasm32.wasm "$packageDir\.artifacts\aivm-wasm32\"
          Copy-Item .\.artifacts\aivm-wasm32\aivm-runtime-wasm32-web.wasm "$packageDir\.artifacts\aivm-wasm32\"
          Copy-Item .\.artifacts\aivm-wasm32\aivm-runtime-wasm32-web.mjs "$packageDir\.artifacts\aivm-wasm32\"
          .\scripts\stage-sdk-docs.ps1 $packageDir
          Compress-Archive -Path $packageDir -DestinationPath "$packageDir.zip" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: airun-${{ matrix.rid }}
          path: airun-${{ needs.prepare.outputs.version }}-${{ matrix.rid }}.${{ matrix.archive }}

  package-wasm32:
    name: package-wasm32
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build wasm runtime artifact
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build-aivm-wasm.sh

      - name: Setup wasmtime
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://wasmtime.dev/install.sh | bash
          echo "${HOME}/.wasmtime/bin" >> "${GITHUB_PATH}"

      - name: Wasm golden smoke
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/test-wasm-golden.sh
          mkdir -p .tmp
          ./scripts/test-wasm-golden.sh | tee .tmp/test-wasm-golden.log
          source_cases="$(rg -o 'wasm golden corpus: PASS \([0-9]+ cases\)' .tmp/test-wasm-golden.log | tail -n1 | rg -o '[0-9]+' | head -n1)"
          bytecode_cases="$(rg -o 'wasm bytecode-only corpus: PASS \([0-9]+ cases\)' .tmp/test-wasm-golden.log | tail -n1 | rg -o '[0-9]+' | head -n1)"
          malformed_cases="$(rg -o 'wasm malformed corpus: PASS \([0-9]+ cases\)' .tmp/test-wasm-golden.log | tail -n1 | rg -o '[0-9]+' | head -n1)"
          profiles_status="fail"
          if rg -q 'wasm golden profiles: PASS \(cli/spa/fullstack\)' .tmp/test-wasm-golden.log; then
            profiles_status="pass"
          fi
          echo "### WASM Golden Coverage" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Metric | Value |" >> "${GITHUB_STEP_SUMMARY}"
          echo "|---|---|" >> "${GITHUB_STEP_SUMMARY}"
          echo "| source corpus | ${source_cases:-0} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| bytecode-only corpus | ${bytecode_cases:-0} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| malformed corpus | ${malformed_cases:-0} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| profiles (cli/spa/fullstack) | ${profiles_status} |" >> "${GITHUB_STEP_SUMMARY}"

      - name: Pack wasm runtime artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          PACKAGE_DIR="airun-${VERSION}-wasm32"
          mkdir -p "${PACKAGE_DIR}"
          test -f ./.artifacts/aivm-wasm32/aivm-runtime-wasm32.wasm
          test -f ./.artifacts/aivm-wasm32/aivm-runtime-wasm32-web.wasm
          test -f ./.artifacts/aivm-wasm32/aivm-runtime-wasm32-web.mjs
          cp ./.artifacts/aivm-wasm32/aivm-runtime-wasm32.wasm "${PACKAGE_DIR}/"
          cp ./.artifacts/aivm-wasm32/aivm-runtime-wasm32-web.wasm "${PACKAGE_DIR}/"
          cp ./.artifacts/aivm-wasm32/aivm-runtime-wasm32-web.mjs "${PACKAGE_DIR}/"
          cp ./LICENSE "${PACKAGE_DIR}/"
          tar -czf "${PACKAGE_DIR}.tar.gz" "${PACKAGE_DIR}"

      - name: Upload wasm runtime files
        uses: actions/upload-artifact@v4
        with:
          name: wasm-runtime-files
          path: ./.artifacts/aivm-wasm32

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: airun-wasm32
          path: airun-${{ needs.prepare.outputs.version }}-wasm32.tar.gz

  release:
    name: github-release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - package
      - package-wasm32

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets
          merge-multiple: true

      - name: Enrich per-RID packages with cross-target artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          declare -a ALL_RIDS=(
            "linux-x64"
            "linux-arm64"
            "osx-x64"
            "osx-arm64"
            "windows-x64"
            "windows-arm64"
          )
          declare -a UNIX_RIDS=(
            "linux-x64"
            "linux-arm64"
            "osx-x64"
            "osx-arm64"
          )
          declare -a WINDOWS_RIDS=(
            "windows-x64"
            "windows-arm64"
          )

          for RID in "${ALL_RIDS[@]}"; do
            PKG_DIR="airun-${VERSION}-${RID}"
            TAR_PATH="./release-assets/${PKG_DIR}.tar.gz"
            ZIP_PATH="./release-assets/${PKG_DIR}.zip"
            if [[ -f "${TAR_PATH}" ]]; then
              tar -xzf "${TAR_PATH}" -C ./release-assets
            elif [[ -f "${ZIP_PATH}" ]]; then
              unzip -q "${ZIP_PATH}" -d ./release-assets
            else
              echo "missing packaged runtime for ${RID}" >&2
              exit 1
            fi
          done

          WASM_PKG="airun-${VERSION}-wasm32"
          tar -xzf "./release-assets/${WASM_PKG}.tar.gz" -C ./release-assets

          for TARGET_RID in "${ALL_RIDS[@]}"; do
            TARGET_PKG="airun-${VERSION}-${TARGET_RID}"
            TARGET_DIR="./release-assets/${TARGET_PKG}"
            mkdir -p "${TARGET_DIR}/.artifacts"

            for SRC_RID in "${UNIX_RIDS[@]}"; do
              mkdir -p "${TARGET_DIR}/.artifacts/airun-${SRC_RID}"
              cp "./release-assets/airun-${VERSION}-${SRC_RID}/aivm-runtime" "${TARGET_DIR}/.artifacts/airun-${SRC_RID}/aivm-runtime"
              chmod +x "${TARGET_DIR}/.artifacts/airun-${SRC_RID}/aivm-runtime"
            done
            for SRC_RID in "${WINDOWS_RIDS[@]}"; do
              mkdir -p "${TARGET_DIR}/.artifacts/airun-${SRC_RID}"
              cp "./release-assets/airun-${VERSION}-${SRC_RID}/aivm-runtime.exe" "${TARGET_DIR}/.artifacts/airun-${SRC_RID}/aivm-runtime.exe"
            done

            mkdir -p "${TARGET_DIR}/.artifacts/aivm-wasm32"
            cp "./release-assets/${WASM_PKG}/aivm-runtime-wasm32.wasm" "${TARGET_DIR}/.artifacts/aivm-wasm32/"
            cp "./release-assets/${WASM_PKG}/aivm-runtime-wasm32-web.wasm" "${TARGET_DIR}/.artifacts/aivm-wasm32/"
            cp "./release-assets/${WASM_PKG}/aivm-runtime-wasm32-web.mjs" "${TARGET_DIR}/.artifacts/aivm-wasm32/"
          done

          for RID in "${UNIX_RIDS[@]}"; do
            PKG="airun-${VERSION}-${RID}"
            rm -f "./release-assets/${PKG}.tar.gz"
            tar -czf "./release-assets/${PKG}.tar.gz" -C ./release-assets "${PKG}"
          done
          for RID in "${WINDOWS_RIDS[@]}"; do
            PKG="airun-${VERSION}-${RID}"
            rm -f "./release-assets/${PKG}.zip"
            (cd ./release-assets && zip -qr "${PKG}.zip" "${PKG}")
          done

      - name: Generate release notes
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.prepare.outputs.tag }}';
            const target = context.sha;
            const { data } = await github.request('POST /repos/{owner}/{repo}/releases/generate-notes', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: target
            });
            const marker = [
              '## Cutover Notice',
              '- `v0.0.1-alpha.6` is the final release that may include C# dependencies.',
              '- Releases after `v0.0.1-alpha.6` are C-runtime/tooling canonical in active paths.',
              ''
            ].join('\n');
            const notes = `${marker}\n${data.body || ''}\n`;
            require('fs').writeFileSync('RELEASE_NOTES.md', notes, { encoding: 'utf8' });

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          body_path: ./RELEASE_NOTES.md
          files: ./release-assets/*
