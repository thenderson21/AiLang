name: Toolkit Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  prepare:
    name: prepare-release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enforce release ref
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            exit 0
          fi
          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            exit 0
          fi
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            exit 0
          fi
          echo "Releases can only run from main, workflow_dispatch, or v* tags." >&2
          exit 1
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}

      - name: Compute version and tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          else
            VERSION="$(AILANG_PRERELEASE_BUILD="${GITHUB_RUN_NUMBER}" ./scripts/read-version.sh --prerelease)"
            TAG="$(AILANG_PRERELEASE_BUILD="${GITHUB_RUN_NUMBER}" ./scripts/read-version.sh --prerelease-tag)"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
        env:
          GITHUB_REF_TYPE: ${{ github.ref_type }}

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "Release is already running from tag ${GITHUB_REF_NAME}."
            exit 0
          fi
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "Release ${TAG}" "${GITHUB_SHA}"
            git push origin "${TAG}"
          fi
        env:
          GITHUB_REF_TYPE: ${{ github.ref_type }}

  build-gate:
    name: build-gate-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-14
          - os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout AiVM native source
        uses: actions/checkout@v6
        with:
          repository: AiLangCore/AiVM
          ref: develop
          path: AiVM

      - name: Setup MSVC tools
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Stage AiLang tools (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          AIVM_C_SOURCE_DIR: ${{ github.workspace }}/AiVM/native
        run: |
          set -euo pipefail
          AILANG_IGNORE_PROJECT_TOOLCHAIN=1 ./build.sh
          test -x ./tools/ailang

      - name: Stage AiLang tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          AIVM_C_SOURCE_DIR: ${{ github.workspace }}\AiVM\native
        run: |
          $env:AILANG_IGNORE_PROJECT_TOOLCHAIN = '1'
          ./build.ps1
          if (-not (Test-Path .\tools\ailang.exe)) { throw 'missing tools/ailang.exe' }

      - name: Runtime smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ./tools/ailang --version >/dev/null

      - name: Memory leak gate (Unix)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp/leak-reports
          AIVM_LEAK_CHECK_ITERATIONS=50 \
          AIVM_LEAK_MAX_GROWTH_KB=2048 \
          AIVM_LEAK_REPORT=.tmp/leak-reports/toolkit-release-${{ matrix.os }}.txt \
          echo "memory leak gate moved to AiVM"

      - name: Upload leak report (failed Unix run)
        if: failure() && runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: toolkit-release-leak-report-${{ matrix.os }}
          path: .tmp/leak-reports/toolkit-release-${{ matrix.os }}.txt
          if-no-files-found: ignore

      - name: Runtime smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & .\tools\ailang.exe --version | Out-Null
          if ($LASTEXITCODE -ne 0) { throw 'native runtime smoke failed' }

  package:
    name: package-${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    needs:
      - prepare
      - build-gate
      - package-wasm32
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            platform: linux
            arch: x64
            archive: tar.gz
            artifact_dir: .artifacts/ailang-linux-x64
            frontend: aos_frontend
            tool: ailang
            runtime: aivm-runtime
          - os: ubuntu-latest
            rid: linux-arm64
            platform: linux
            arch: arm64
            archive: tar.gz
            artifact_dir: .artifacts/ailang-linux-arm64
            frontend: aos_frontend
            tool: ailang
            runtime: aivm-runtime
          - os: macos-14
            rid: osx-x64
            platform: osx
            arch: x64
            archive: tar.gz
            artifact_dir: .artifacts/ailang-osx-x64
            frontend: aos_frontend
            tool: ailang
            runtime: aivm-runtime
          - os: macos-14
            rid: osx-arm64
            platform: osx
            arch: arm64
            archive: tar.gz
            artifact_dir: .artifacts/ailang-osx-arm64
            frontend: aos_frontend
            tool: ailang
            runtime: aivm-runtime
          - os: windows-latest
            rid: windows-x64
            platform: windows
            arch: x64
            archive: zip
            artifact_dir: .artifacts/ailang-windows-x64
            frontend: aos_frontend.exe
            tool: ailang.exe
            runtime: aivm-runtime.exe
            msvc_arch: amd64
          - os: windows-latest
            rid: windows-arm64
            platform: windows
            arch: arm64
            archive: zip
            artifact_dir: .artifacts/ailang-windows-arm64
            frontend: aos_frontend.exe
            tool: ailang.exe
            runtime: aivm-runtime.exe
            msvc_arch: amd64_arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout AiVM native source
        uses: actions/checkout@v6
        with:
          repository: AiLangCore/AiVM
          ref: develop
          path: AiVM

      - name: Download wasm runtime files
        uses: actions/download-artifact@v8
        with:
          name: wasm-runtime-files
          path: ./.artifacts/aivm-wasm32

      - name: Setup MSVC tools
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Setup Linux ARM64 cross toolchain
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          echo "native cross-compile moved to AiVM"

      - name: Stage AiLang tools (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        env:
          AIVM_C_SOURCE_DIR: ${{ github.workspace }}/AiVM/native
        run: |
          set -euo pipefail
          AILANG_NATIVE_PLATFORM="${{ matrix.platform }}" \
          AILANG_NATIVE_ARCH="${{ matrix.arch }}" \
          AILANG_IGNORE_PROJECT_TOOLCHAIN=1 ./build.sh

      - name: Stage AiLang tools (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          AIVM_C_SOURCE_DIR: ${{ github.workspace }}\AiVM\native
        run: |
          $env:AILANG_NATIVE_ARCH = '${{ matrix.arch }}'
          $env:AILANG_IGNORE_PROJECT_TOOLCHAIN = '1'
          ./build.ps1

      - name: Stage frontend parser (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./dist
          cp ./tools/aos_frontend "./dist/${{ matrix.frontend }}"
          chmod +x "./dist/${{ matrix.frontend }}"

      - name: Stage frontend parser (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\dist | Out-Null
          cl /nologo /O2 /std:c11 /Fe:.\dist\${{ matrix.frontend }} .\tools\aos_frontend.c
          Remove-Item -Force .\aos_frontend.obj -ErrorAction SilentlyContinue

      - name: Stage compiler assets (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./dist/compiler
          cp ./src/compiler/*.aos ./dist/compiler/

      - name: Stage compiler assets (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\dist\compiler | Out-Null
          Copy-Item .\src\compiler\*.aos .\dist\compiler\

      - name: Pack release artifact (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          PACKAGE_DIR="ailang-${VERSION}-${{ matrix.rid }}"
          mkdir -p "${PACKAGE_DIR}"
          cp "./dist/${{ matrix.frontend }}" "${PACKAGE_DIR}/"
          test -x "./${{ matrix.artifact_dir }}/${{ matrix.tool }}"
          cp "./${{ matrix.artifact_dir }}/${{ matrix.tool }}" "${PACKAGE_DIR}/"
          test -x "./${{ matrix.artifact_dir }}/${{ matrix.runtime }}"
          cp "./${{ matrix.artifact_dir }}/${{ matrix.runtime }}" "${PACKAGE_DIR}/"
          mkdir -p "${PACKAGE_DIR}/bin"
          cp "./${{ matrix.artifact_dir }}/${{ matrix.tool }}" "${PACKAGE_DIR}/bin/ailang"
          cp "./${{ matrix.artifact_dir }}/${{ matrix.runtime }}" "${PACKAGE_DIR}/bin/aivm-runtime"
          chmod +x "${PACKAGE_DIR}/bin/ailang" "${PACKAGE_DIR}/bin/aivm-runtime"
          cp "./dist/${{ matrix.frontend }}" "${PACKAGE_DIR}/bin/aos_frontend"
          chmod +x "${PACKAGE_DIR}/bin/aos_frontend"
          mkdir -p "${PACKAGE_DIR}/runtimes/${{ matrix.rid }}"
          cp "./${{ matrix.artifact_dir }}/${{ matrix.runtime }}" "${PACKAGE_DIR}/runtimes/${{ matrix.rid }}/aivm"
          chmod +x "${PACKAGE_DIR}/runtimes/${{ matrix.rid }}/aivm"
          cp -R ./dist/compiler "${PACKAGE_DIR}/compiler"
          cp -R ./templates "${PACKAGE_DIR}/templates"
          mkdir -p "${PACKAGE_DIR}/.artifacts/aivm-wasm32"
          cp ./.artifacts/aivm-wasm32/aivm-runtime-wasm32.wasm "${PACKAGE_DIR}/.artifacts/aivm-wasm32/"
          cp ./.artifacts/aivm-wasm32/aivm-runtime-wasm32-web.wasm "${PACKAGE_DIR}/.artifacts/aivm-wasm32/"
          cp ./.artifacts/aivm-wasm32/aivm-runtime-wasm32-web.mjs "${PACKAGE_DIR}/.artifacts/aivm-wasm32/"
          ./scripts/stage-sdk-docs.sh "${PACKAGE_DIR}"
          cp ./LICENSE "${PACKAGE_DIR}/"
          tar -czf "${PACKAGE_DIR}.tar.gz" "${PACKAGE_DIR}"

      - name: Pack release artifact (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $version = '${{ needs.prepare.outputs.version }}'
          $packageDir = "ailang-$version-${{ matrix.rid }}"
          New-Item -ItemType Directory -Force $packageDir | Out-Null
          Copy-Item ".\\dist\\${{ matrix.frontend }}" $packageDir
          if (-not (Test-Path ".\\${{ matrix.artifact_dir }}\\${{ matrix.tool }}")) { throw 'missing ailang tool' }
          Copy-Item ".\\${{ matrix.artifact_dir }}\\${{ matrix.tool }}" $packageDir
          if (-not (Test-Path ".\\${{ matrix.artifact_dir }}\\${{ matrix.runtime }}")) { throw 'missing minimal runtime' }
          Copy-Item ".\\${{ matrix.artifact_dir }}\\${{ matrix.runtime }}" $packageDir
          New-Item -ItemType Directory -Force "$packageDir\bin" | Out-Null
          Copy-Item ".\\${{ matrix.artifact_dir }}\\${{ matrix.tool }}" "$packageDir\bin\ailang.exe"
          Copy-Item ".\\${{ matrix.artifact_dir }}\\${{ matrix.runtime }}" "$packageDir\bin\aivm-runtime.exe"
          Copy-Item ".\\dist\\${{ matrix.frontend }}" "$packageDir\bin\aos_frontend.exe"
          $targetRid = '${{ matrix.rid }}' -replace '^windows-', 'win-'
          New-Item -ItemType Directory -Force "$packageDir\runtimes\$targetRid" | Out-Null
          Copy-Item ".\\${{ matrix.artifact_dir }}\\${{ matrix.runtime }}" "$packageDir\runtimes\$targetRid\aivm.exe"
          Copy-Item .\LICENSE $packageDir
          Copy-Item .\dist\compiler $packageDir -Recurse
          Copy-Item .\templates $packageDir -Recurse
          New-Item -ItemType Directory -Force "$packageDir\.artifacts\aivm-wasm32" | Out-Null
          Copy-Item .\.artifacts\aivm-wasm32\aivm-runtime-wasm32.wasm "$packageDir\.artifacts\aivm-wasm32\"
          Copy-Item .\.artifacts\aivm-wasm32\aivm-runtime-wasm32-web.wasm "$packageDir\.artifacts\aivm-wasm32\"
          Copy-Item .\.artifacts\aivm-wasm32\aivm-runtime-wasm32-web.mjs "$packageDir\.artifacts\aivm-wasm32\"
          .\scripts\stage-sdk-docs.ps1 $packageDir
          Compress-Archive -Path $packageDir -DestinationPath "$packageDir.zip" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: ailang-${{ matrix.rid }}
          path: ailang-${{ needs.prepare.outputs.version }}-${{ matrix.rid }}.${{ matrix.archive }}

  package-wasm32:
    name: package-wasm32
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout AiVM native source
        uses: actions/checkout@v6
        with:
          repository: AiLangCore/AiVM
          ref: develop
          path: AiVM

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: latest

      - name: Build wasm runtime artifact
        shell: bash
        env:
          AIVM_C_SOURCE_DIR: ${{ github.workspace }}/AiVM/native
        run: |
          set -euo pipefail
          ./build.sh wasm

      - name: Stage host tools for wasm golden tests
        shell: bash
        env:
          AIVM_C_SOURCE_DIR: ${{ github.workspace }}/AiVM/native
        run: |
          set -euo pipefail
          AILANG_NATIVE_PLATFORM=linux \
          AILANG_NATIVE_ARCH=x64 \
          AILANG_IGNORE_PROJECT_TOOLCHAIN=1 ./build.sh host

      - name: Setup wasmtime
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://wasmtime.dev/install.sh | bash
          echo "${HOME}/.wasmtime/bin" >> "${GITHUB_PATH}"

      - name: Wasm golden smoke
        shell: bash
        env:
          AIVM_C_SOURCE_DIR: ${{ github.workspace }}/AiVM/native
        run: |
          set -euo pipefail
          chmod +x ./scripts/test-wasm-golden.sh
          mkdir -p .tmp
          ./scripts/test-wasm-golden.sh | tee .tmp/test-wasm-golden.log
          source_cases="$(grep -Eo 'wasm golden corpus: PASS \([0-9]+ cases\)' .tmp/test-wasm-golden.log | tail -n1 | sed -E 's/.*\(([0-9]+) cases\).*/\1/')"
          bytecode_cases="$(grep -Eo 'wasm bytecode-only corpus: PASS \([0-9]+ cases\)' .tmp/test-wasm-golden.log | tail -n1 | sed -E 's/.*\(([0-9]+) cases\).*/\1/')"
          malformed_cases="$(grep -Eo 'wasm malformed corpus: PASS \([0-9]+ cases\)' .tmp/test-wasm-golden.log | tail -n1 | sed -E 's/.*\(([0-9]+) cases\).*/\1/')"
          profiles_status="fail"
          if grep -Eq 'wasm golden profiles: PASS \(cli/spa/fullstack\)' .tmp/test-wasm-golden.log; then
            profiles_status="pass"
          fi
          echo "### WASM Golden Coverage" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Metric | Value |" >> "${GITHUB_STEP_SUMMARY}"
          echo "|---|---|" >> "${GITHUB_STEP_SUMMARY}"
          echo "| source corpus | ${source_cases:-0} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| bytecode-only corpus | ${bytecode_cases:-0} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| malformed corpus | ${malformed_cases:-0} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| profiles (cli/spa/fullstack) | ${profiles_status} |" >> "${GITHUB_STEP_SUMMARY}"

      - name: Pack wasm runtime artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          PACKAGE_DIR="ailang-${VERSION}-wasm32"
          mkdir -p "${PACKAGE_DIR}"
          test -f ./.artifacts/aivm-wasm32/aivm-runtime-wasm32.wasm
          test -f ./.artifacts/aivm-wasm32/aivm-runtime-wasm32-web.wasm
          test -f ./.artifacts/aivm-wasm32/aivm-runtime-wasm32-web.mjs
          cp ./.artifacts/aivm-wasm32/aivm-runtime-wasm32.wasm "${PACKAGE_DIR}/"
          cp ./.artifacts/aivm-wasm32/aivm-runtime-wasm32-web.wasm "${PACKAGE_DIR}/"
          cp ./.artifacts/aivm-wasm32/aivm-runtime-wasm32-web.mjs "${PACKAGE_DIR}/"
          cp ./LICENSE "${PACKAGE_DIR}/"
          tar -czf "${PACKAGE_DIR}.tar.gz" "${PACKAGE_DIR}"

      - name: Upload wasm runtime files
        uses: actions/upload-artifact@v7
        with:
          name: wasm-runtime-files
          path: ./.artifacts/aivm-wasm32

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v7
        with:
          name: ailang-wasm32
          path: ailang-${{ needs.prepare.outputs.version }}-wasm32.tar.gz

  release:
    name: github-release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - package
      - package-wasm32

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release-assets
          merge-multiple: true

      - name: Enrich per-RID packages with cross-target artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          declare -a ALL_RIDS=(
            "linux-x64"
            "linux-arm64"
            "osx-x64"
            "osx-arm64"
            "windows-x64"
            "windows-arm64"
          )
          declare -a UNIX_RIDS=(
            "linux-x64"
            "linux-arm64"
            "osx-x64"
            "osx-arm64"
          )
          declare -a WINDOWS_RIDS=(
            "windows-x64"
            "windows-arm64"
          )
          target_rid() {
            case "$1" in
              windows-x64) echo "win-x64" ;;
              windows-arm64) echo "win-arm64" ;;
              *) echo "$1" ;;
            esac
          }

          for RID in "${ALL_RIDS[@]}"; do
            PKG_DIR="ailang-${VERSION}-${RID}"
            TAR_PATH="./release-assets/${PKG_DIR}.tar.gz"
            ZIP_PATH="./release-assets/${PKG_DIR}.zip"
            if [[ -f "${TAR_PATH}" ]]; then
              tar -xzf "${TAR_PATH}" -C ./release-assets
            elif [[ -f "${ZIP_PATH}" ]]; then
              unzip -q "${ZIP_PATH}" -d ./release-assets
            else
              echo "missing packaged runtime for ${RID}" >&2
              exit 1
            fi
          done

          WASM_PKG="ailang-${VERSION}-wasm32"
          tar -xzf "./release-assets/${WASM_PKG}.tar.gz" -C ./release-assets

          for TARGET_RID in "${ALL_RIDS[@]}"; do
            TARGET_PKG="ailang-${VERSION}-${TARGET_RID}"
            TARGET_DIR="./release-assets/${TARGET_PKG}"
            mkdir -p "${TARGET_DIR}/.artifacts"

            for SRC_RID in "${UNIX_RIDS[@]}"; do
              TARGET_RUNTIME_RID="$(target_rid "${SRC_RID}")"
              mkdir -p "${TARGET_DIR}/.artifacts/ailang-${SRC_RID}"
              cp "./release-assets/ailang-${VERSION}-${SRC_RID}/aivm-runtime" "${TARGET_DIR}/.artifacts/ailang-${SRC_RID}/aivm-runtime"
              chmod +x "${TARGET_DIR}/.artifacts/ailang-${SRC_RID}/aivm-runtime"
              mkdir -p "${TARGET_DIR}/runtimes/${TARGET_RUNTIME_RID}"
              cp "./release-assets/ailang-${VERSION}-${SRC_RID}/aivm-runtime" "${TARGET_DIR}/runtimes/${TARGET_RUNTIME_RID}/aivm"
              chmod +x "${TARGET_DIR}/runtimes/${TARGET_RUNTIME_RID}/aivm"
            done
            for SRC_RID in "${WINDOWS_RIDS[@]}"; do
              TARGET_RUNTIME_RID="$(target_rid "${SRC_RID}")"
              mkdir -p "${TARGET_DIR}/.artifacts/ailang-${SRC_RID}"
              cp "./release-assets/ailang-${VERSION}-${SRC_RID}/aivm-runtime.exe" "${TARGET_DIR}/.artifacts/ailang-${SRC_RID}/aivm-runtime.exe"
              mkdir -p "${TARGET_DIR}/runtimes/${TARGET_RUNTIME_RID}"
              cp "./release-assets/ailang-${VERSION}-${SRC_RID}/aivm-runtime.exe" "${TARGET_DIR}/runtimes/${TARGET_RUNTIME_RID}/aivm.exe"
            done

            mkdir -p "${TARGET_DIR}/.artifacts/aivm-wasm32"
            cp "./release-assets/${WASM_PKG}/aivm-runtime-wasm32.wasm" "${TARGET_DIR}/.artifacts/aivm-wasm32/"
            cp "./release-assets/${WASM_PKG}/aivm-runtime-wasm32-web.wasm" "${TARGET_DIR}/.artifacts/aivm-wasm32/"
            cp "./release-assets/${WASM_PKG}/aivm-runtime-wasm32-web.mjs" "${TARGET_DIR}/.artifacts/aivm-wasm32/"
            mkdir -p "${TARGET_DIR}/runtimes/wasm-wasi" "${TARGET_DIR}/runtimes/wasm-browser"
            cp "./release-assets/${WASM_PKG}/aivm-runtime-wasm32.wasm" "${TARGET_DIR}/runtimes/wasm-wasi/aivm.wasm"
            cp "./release-assets/${WASM_PKG}/aivm-runtime-wasm32-web.wasm" "${TARGET_DIR}/runtimes/wasm-browser/aivm.wasm"
            cp "./release-assets/${WASM_PKG}/aivm-runtime-wasm32-web.mjs" "${TARGET_DIR}/runtimes/wasm-browser/aivm.mjs"
          done

          for RID in "${UNIX_RIDS[@]}"; do
            PKG="ailang-${VERSION}-${RID}"
            rm -f "./release-assets/${PKG}.tar.gz"
            tar -czf "./release-assets/${PKG}.tar.gz" -C ./release-assets "${PKG}"
          done
          for RID in "${WINDOWS_RIDS[@]}"; do
            PKG="ailang-${VERSION}-${RID}"
            rm -f "./release-assets/${PKG}.zip"
            (cd ./release-assets && zip -qr "${PKG}.zip" "${PKG}")
          done

      - name: Generate release notes
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.prepare.outputs.tag }}';
            const target = context.sha;
            const { data } = await github.request('POST /repos/{owner}/{repo}/releases/generate-notes', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: target
            });
            const marker = [
              '## Cutover Notice',
              '- `v0.0.1-alpha.6` is the final release that may include C# dependencies.',
              '- Releases after `v0.0.1-alpha.6` are C-runtime/tooling canonical in active paths.',
              ''
            ].join('\n');
            const notes = `${marker}\n${data.body || ''}\n`;
            require('fs').writeFileSync('RELEASE_NOTES.md', notes, { encoding: 'utf8' });

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          prerelease: ${{ contains(needs.prepare.outputs.tag, '-alpha') || contains(needs.prepare.outputs.tag, '-beta') || contains(needs.prepare.outputs.tag, '-rc') || contains(needs.prepare.outputs.tag, '-local') }}
          body_path: ./RELEASE_NOTES.md
          files: ./release-assets/*

      - name: Publish uploaded draft
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release edit "${{ needs.prepare.outputs.tag }}" --draft=false

  install-smoke-unix:
    name: install-smoke-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs:
      - prepare
      - release
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Exact version install smoke
        shell: bash
        run: |
          set -euo pipefail
          export AILANG_INSTALL_ROOT="${RUNNER_TEMP}/ailang-exact"
          curl -fsSL https://ailang.codes/install.sh | sh -s -- --version "${{ needs.prepare.outputs.version }}" --root "${AILANG_INSTALL_ROOT}"
          export PATH="${AILANG_INSTALL_ROOT}/bin:${PATH}"

          ailang --version
          aivm --version
          aivectra help >/dev/null
          ailang template list projects >/dev/null

          APP_DIR="${RUNNER_TEMP}/SmokeExact"
          ailang init "${APP_DIR}" --agent codex
          ailang build "${APP_DIR}"
          ailang run "${APP_DIR}"
          ./scripts/test-installed-package-workflow.sh

      - name: Beta channel install smoke
        shell: bash
        run: |
          set -euo pipefail
          export AILANG_INSTALL_ROOT="${RUNNER_TEMP}/ailang-channel"
          curl -fsSL https://ailang.codes/install.sh | sh -s -- --channel beta --root "${AILANG_INSTALL_ROOT}"
          export PATH="${AILANG_INSTALL_ROOT}/bin:${PATH}"

          ailang --version
          aivm --version
          aivectra help >/dev/null

          APP_DIR="${RUNNER_TEMP}/SmokeChannel"
          ailang init "${APP_DIR}" --agent codex
          ailang build "${APP_DIR}"
          ailang run "${APP_DIR}"
          ./scripts/test-installed-package-workflow.sh

  install-smoke-windows:
    name: install-smoke-windows
    runs-on: windows-latest
    needs:
      - prepare
      - release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Exact version install smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $installer = Join-Path $env:RUNNER_TEMP 'install.ps1'
          Invoke-WebRequest -Uri 'https://ailang.codes/install.ps1' -OutFile $installer

          $installRoot = Join-Path $env:RUNNER_TEMP 'ailang-exact'
          & $installer -Version '${{ needs.prepare.outputs.version }}' -InstallRoot $installRoot
          $env:PATH = "$installRoot\bin;$env:PATH"

          ailang --version
          aivm --version
          aivectra help | Out-Null
          ailang template list projects | Out-Null

          $appDir = Join-Path $env:RUNNER_TEMP 'SmokeExact'
          ailang init $appDir --agent codex
          ailang build $appDir
          ailang run $appDir
          .\scripts\test-installed-package-workflow.ps1

      - name: Beta channel install smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $installer = Join-Path $env:RUNNER_TEMP 'install.ps1'
          Invoke-WebRequest -Uri 'https://ailang.codes/install.ps1' -OutFile $installer

          $installRoot = Join-Path $env:RUNNER_TEMP 'ailang-channel'
          & $installer -Channel beta -InstallRoot $installRoot
          $env:PATH = "$installRoot\bin;$env:PATH"

          ailang --version
          aivm --version
          aivectra help | Out-Null

          $appDir = Join-Path $env:RUNNER_TEMP 'SmokeChannel'
          ailang init $appDir --agent codex
          ailang build $appDir
          ailang run $appDir
          .\scripts\test-installed-package-workflow.ps1
