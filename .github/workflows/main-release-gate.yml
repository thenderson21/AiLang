name: Main Release Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-matrix:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            frontend: aos_frontend
          - os: macos-14
            rid: osx-arm64
            frontend: aos_frontend
          - os: macos-14
            rid: osx-x64
            frontend: aos_frontend
          - os: windows-latest
            rid: win-x64
            frontend: aos_frontend.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage airun (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./dist
          if [[ -x ./tools/airun ]]; then
            cp ./tools/airun ./dist/airun
            chmod +x ./dist/airun
          else
            printf 'airun runtime not yet produced in native release\n' > ./dist/AIRUN_UNAVAILABLE.txt
          fi

      - name: Stage airun (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\dist | Out-Null
          if (Test-Path .\tools\airun.exe) {
            Copy-Item .\tools\airun.exe .\dist\airun.exe
          } elseif (Test-Path .\tools\airun) {
            Copy-Item .\tools\airun .\dist\airun.exe
          } else {
            "airun runtime not yet produced in native release" | Out-File .\dist\AIRUN_UNAVAILABLE.txt -Encoding utf8
          }

      - name: Build frontend parser (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cc -std=c11 -O2 ./tools/aos_frontend.c -o "./dist/${{ matrix.frontend }}"
          chmod +x "./dist/${{ matrix.frontend }}"

      - name: Setup MSVC tools
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build frontend parser (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cl /nologo /O2 /std:c11 /Fe:.\dist\${{ matrix.frontend }} .\tools\aos_frontend.c
          Remove-Item -Force .\aos_frontend.obj -ErrorAction SilentlyContinue

      - name: Stage compiler assets (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./dist/compiler
          cp ./src/compiler/*.aos ./dist/compiler/

      - name: Stage compiler assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\dist\compiler | Out-Null
          Copy-Item .\src\compiler\*.aos .\dist\compiler\

      - name: Verify toolkit files (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f ./dist/airun ]]; then test -x ./dist/airun; fi
          test -x "./dist/${{ matrix.frontend }}"
          test -f ./dist/compiler/format.aos
          test -f ./dist/compiler/validate.aos
          test -f ./dist/compiler/route.aos
          test -f ./dist/compiler/json.aos
          test -f ./dist/compiler/http.aos
          test -f ./dist/compiler/runtime.aos

      - name: Verify toolkit files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path .\dist\airun.exe) -and !(Test-Path .\dist\AIRUN_UNAVAILABLE.txt)) { throw "missing airun artifact" }
          if (!(Test-Path .\dist\${{ matrix.frontend }})) { throw "missing frontend exe" }
          if (!(Test-Path .\dist\compiler\format.aos)) { throw "missing format.aos" }
          if (!(Test-Path .\dist\compiler\validate.aos)) { throw "missing validate.aos" }
          if (!(Test-Path .\dist\compiler\route.aos)) { throw "missing route.aos" }
          if (!(Test-Path .\dist\compiler\json.aos)) { throw "missing json.aos" }
          if (!(Test-Path .\dist\compiler\http.aos)) { throw "missing http.aos" }
          if (!(Test-Path .\dist\compiler\runtime.aos)) { throw "missing runtime.aos" }

  golden-gate:
    name: golden-gate-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            frontend: aos_frontend
            airun: airun
          - os: macos-14
            rid: osx-arm64
            frontend: aos_frontend
            airun: airun
          - os: windows-latest
            rid: win-x64
            frontend: aos_frontend.exe
            airun: airun.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend for gate (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./dist
          if [[ -x ./tools/airun ]]; then
            cp ./tools/airun "./dist/${{ matrix.airun }}"
          fi
          cc -std=c11 -O2 ./tools/aos_frontend.c -o "./dist/${{ matrix.frontend }}"
          chmod +x "./dist/${{ matrix.frontend }}"

      - name: Stage compiler assets for gate (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./dist/compiler
          cp ./src/compiler/*.aos ./dist/compiler/

      - name: Setup MSVC tools
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build frontend for gate (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\dist | Out-Null
          if (Test-Path .\tools\airun.exe) {
            Copy-Item .\tools\airun.exe .\dist\${{ matrix.airun }}
          } elseif (Test-Path .\tools\airun) {
            Copy-Item .\tools\airun .\dist\${{ matrix.airun }}
          }
          cl /nologo /O2 /std:c11 /Fe:.\dist\${{ matrix.frontend }} .\tools\aos_frontend.c
          Remove-Item -Force .\aos_frontend.obj -ErrorAction SilentlyContinue

      - name: Stage compiler assets for gate (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\dist\compiler | Out-Null
          Copy-Item .\src\compiler\*.aos .\dist\compiler\

      - name: Run full golden gate
        shell: bash
        env:
          AIRUN_BIN: ./dist/${{ matrix.airun }}
          AOS_FRONTEND: ./dist/${{ matrix.frontend }}
        run: ./scripts/test.sh
