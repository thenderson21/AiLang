name: Main Release Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-matrix:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            frontend: aos_frontend
          - os: macos-14
            rid: osx-arm64
            frontend: aos_frontend
          - os: macos-14
            rid: osx-x64
            frontend: aos_frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build + stage airun
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./dist
          ./scripts/build-airun.sh
          test -x ./tools/airun
          cp ./tools/airun ./dist/airun
          chmod +x ./dist/airun

      - name: Build frontend parser
        shell: bash
        run: |
          set -euo pipefail
          cc -std=c11 -O2 ./tools/aos_frontend.c -o "./dist/${{ matrix.frontend }}"
          chmod +x "./dist/${{ matrix.frontend }}"

      - name: Stage compiler assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./dist/compiler
          cp ./src/compiler/*.aos ./dist/compiler/

      - name: Verify toolkit files
        shell: bash
        run: |
          set -euo pipefail
          test -x ./dist/airun
          test -x "./dist/${{ matrix.frontend }}"
          test -f ./dist/compiler/format.aos
          test -f ./dist/compiler/validate.aos
          test -f ./dist/compiler/route.aos
          test -f ./dist/compiler/json.aos
          test -f ./dist/compiler/http.aos
          test -f ./dist/compiler/runtime.aos

  golden-gate:
    name: golden-gate-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            frontend: aos_frontend
            airun: airun
          - os: macos-14
            rid: osx-arm64
            frontend: aos_frontend
            airun: airun
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build toolkit for gate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./dist
          ./scripts/build-airun.sh
          test -x ./tools/airun
          cp ./tools/airun "./dist/${{ matrix.airun }}"
          chmod +x "./dist/${{ matrix.airun }}"
          cc -std=c11 -O2 ./tools/aos_frontend.c -o "./dist/${{ matrix.frontend }}"
          chmod +x "./dist/${{ matrix.frontend }}"
          mkdir -p ./dist/compiler
          cp ./src/compiler/*.aos ./dist/compiler/

      - name: Run full golden gate
        shell: bash
        env:
          AIRUN_BIN: ./dist/${{ matrix.airun }}
          AOS_FRONTEND: ./dist/${{ matrix.frontend }}
        run: ./scripts/test.sh
