name: aivm-c-ci

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/AiVM.Core/native/**'
      - 'src/AiCLI/native/**'
      - 'test-aivm-c.sh'
      - 'test-aivm-c.ps1'
      - 'build.sh'
      - 'build.ps1'
      - 'scripts/aivm-parity-compare.sh'
      - 'scripts/aivm-dualrun-parity.sh'
      - 'scripts/aivm-dualrun-parity-manifest.sh'
      - 'scripts/aivm-dualrun-parity-manifest.ps1'
      - 'scripts/aivm-bench-gate.sh'
      - 'scripts/aivm-parity-dashboard.sh'
      - 'scripts/test-wasm-golden.sh'
      - 'scripts/build-aivm-wasm.sh'
      - 'scripts/aivm-mem-leak-check.sh'
      - 'src/AiVM.Core/native/tests/parity_commands.txt'
      - 'src/AiVM.Core/native/tests/parity_commands_portable.txt'
      - 'src/AiVM.Core/native/tests/parity_commands_ci.txt'
      - 'src/AiVM.Core/native/tests/compiler_runtime_bench_baseline.tsv'
      - '.github/workflows/aivm-c-ci.yml'
  push:
    branches:
      - develop
      - main
    paths:
      - 'src/AiVM.Core/native/**'
      - 'src/AiCLI/native/**'
      - 'test-aivm-c.sh'
      - 'test-aivm-c.ps1'
      - 'build.sh'
      - 'build.ps1'
      - 'scripts/aivm-parity-compare.sh'
      - 'scripts/aivm-dualrun-parity.sh'
      - 'scripts/aivm-dualrun-parity-manifest.sh'
      - 'scripts/aivm-dualrun-parity-manifest.ps1'
      - 'scripts/aivm-bench-gate.sh'
      - 'scripts/aivm-parity-dashboard.sh'
      - 'scripts/test-wasm-golden.sh'
      - 'scripts/build-aivm-wasm.sh'
      - 'scripts/aivm-mem-leak-check.sh'
      - 'src/AiVM.Core/native/tests/parity_commands.txt'
      - 'src/AiVM.Core/native/tests/parity_commands_portable.txt'
      - 'src/AiVM.Core/native/tests/parity_commands_ci.txt'
      - 'src/AiVM.Core/native/tests/compiler_runtime_bench_baseline.tsv'
      - '.github/workflows/aivm-c-ci.yml'

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure + build + test (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p .tmp/leak-reports
          if [ "${{ runner.os }}" = "Linux" ]; then
            AIVM_MEM_LEAK_GATE=1 \
            AIVM_LEAK_CHECK_ITERATIONS=50 \
            AIVM_LEAK_MAX_GROWTH_KB=2048 \
            AIVM_LEAK_REPORT=.tmp/leak-reports/aivm-c-ci-${{ matrix.os }}.txt \
            ./test-aivm-c.sh
          else
            ./test-aivm-c.sh
          fi

      - name: Verify bytes host syscall test (Unix)
        if: runner.os != 'Windows'
        run: ctest --test-dir .tmp/aivm-c-build-native -R aivm_test_bytes_host --output-on-failure

      - name: Perf smoke (Linux)
        if: runner.os == 'Linux'
        run: AIVM_PERF_SMOKE=1 AIVM_PERF_RUNS=10 ./test-aivm-c.sh

      - name: Benchmark gate (Linux)
        if: runner.os == 'Linux'
        run: |
          ./build.sh
          ./scripts/aivm-bench-gate.sh

      - name: Setup Emscripten (Linux)
        if: runner.os == 'Linux'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Setup wasmtime (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://wasmtime.dev/install.sh | bash
          echo "${HOME}/.wasmtime/bin" >> "${GITHUB_PATH}"

      - name: Dashboard summary (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          AIVM_DOD_RUN_TESTS=0 AIVM_DOD_RUN_BENCH=0 AIVM_DOD_RUN_WASM=1 ./scripts/aivm-parity-dashboard.sh .tmp/aivm-parity-dashboard-ci.md
          {
            echo "### AiLang DoD Dashboard (Linux)"
            echo
            awk '
              /## Gates/ { print; in_gates=1; next }
              in_gates && /^## / { in_gates=0 }
              in_gates { print }
            ' .tmp/aivm-parity-dashboard-ci.md
            echo
            awk '
              /## WASM Coverage/ { print; in_wasm=1; next }
              in_wasm && /^## / { in_wasm=0 }
              in_wasm { print }
            ' .tmp/aivm-parity-dashboard-ci.md
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Configure + build + test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./test-aivm-c.ps1

      - name: Verify bytes host syscall test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ctest --test-dir .tmp/aivm-c-build-native -C Debug -R aivm_test_bytes_host --output-on-failure

      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aivm-parity-artifacts-${{ matrix.os }}
          path: |
            .tmp/aivm-parity-dashboard-ci.md
            .tmp/aivm-dualrun-manifest/report.txt
            .tmp/aivm-dualrun-manifest/*.left.out
            .tmp/aivm-dualrun-manifest/*.right.out
          if-no-files-found: ignore

      - name: Upload leak report (failed Unix run)
        if: failure() && runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: aivm-leak-report-${{ matrix.os }}
          path: .tmp/leak-reports/aivm-c-ci-${{ matrix.os }}.txt
          if-no-files-found: ignore
