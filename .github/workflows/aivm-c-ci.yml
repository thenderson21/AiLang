name: aivm-c-ci

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/AiVM.Core/native/**'
      - 'scripts/test-aivm-c.sh'
      - 'scripts/aivm-parity-compare.sh'
      - 'scripts/aivm-dualrun-parity.sh'
      - 'scripts/aivm-dualrun-parity-manifest.sh'
      - 'src/AiVM.Core/native/tests/parity_commands.txt'
      - 'src/AiVM.Core/native/tests/parity_commands_portable.txt'
      - 'src/AiVM.Core/native/tests/parity_commands_ci.txt'
      - '.github/workflows/aivm-c-ci.yml'
  push:
    branches:
      - develop
      - main
    paths:
      - 'src/AiVM.Core/native/**'
      - 'scripts/test-aivm-c.sh'
      - 'scripts/aivm-parity-compare.sh'
      - 'scripts/aivm-dualrun-parity.sh'
      - 'scripts/aivm-dualrun-parity-manifest.sh'
      - 'src/AiVM.Core/native/tests/parity_commands.txt'
      - 'src/AiVM.Core/native/tests/parity_commands_portable.txt'
      - 'src/AiVM.Core/native/tests/parity_commands_ci.txt'
      - '.github/workflows/aivm-c-ci.yml'

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure + build + test (Unix)
        if: runner.os != 'Windows'
        run: ./scripts/test-aivm-c.sh

      - name: Perf smoke (Linux)
        if: runner.os == 'Linux'
        run: AIVM_PERF_SMOKE=1 AIVM_PERF_RUNS=10 ./scripts/test-aivm-c.sh

      - name: Configure + build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S src/AiVM.Core/native -B .tmp/aivm-c-build -G "Visual Studio 17 2022" -A x64
          cmake --build .tmp/aivm-c-build --config Debug

      - name: Compile native airun wrapper (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cl /nologo /std:c17 /W4 /Fe:.\tools\airun.exe .\src\AiCLI\native\airun.c
          if (!(Test-Path .\tools\airun.exe)) { throw "failed to compile tools/airun.exe" }
          Remove-Item -Force .\airun.obj -ErrorAction SilentlyContinue

      - name: Run parity manifest (Windows portable set)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if [[ -x ./tools/airun || -x ./tools/airun.exe ]]; then
            ./scripts/aivm-dualrun-parity-manifest.sh src/AiVM.Core/native/tests/parity_commands_portable.txt .tmp/aivm-dualrun-manifest/report.txt
          else
            mkdir -p .tmp/aivm-dualrun-manifest
            printf 'parity manifest skipped: missing ./tools/airun(.exe)\n' > .tmp/aivm-dualrun-manifest/report.txt
          fi

      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aivm-parity-artifacts-${{ matrix.os }}
          path: |
            .tmp/aivm-dualrun-manifest/report.txt
            .tmp/aivm-dualrun-manifest/*.left.out
            .tmp/aivm-dualrun-manifest/*.right.out
          if-no-files-found: ignore
