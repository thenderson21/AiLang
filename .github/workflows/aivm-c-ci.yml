name: aivm-c-ci

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/AiVM.Core/native/**'
      - 'scripts/test-aivm-c.sh'
      - 'scripts/test-aivm-c.ps1'
      - 'scripts/build-airun.sh'
      - 'scripts/build-airun.ps1'
      - 'scripts/aivm-parity-compare.sh'
      - 'scripts/aivm-dualrun-parity.sh'
      - 'scripts/aivm-dualrun-parity-manifest.sh'
      - 'scripts/aivm-dualrun-parity-manifest.ps1'
      - 'scripts/aivm-bench-gate.sh'
      - 'scripts/aivm-mem-audit.sh'
      - 'scripts/aivm-mem-audit.ps1'
      - 'scripts/aivm-mem-leak-check.sh'
      - 'scripts/aivm-mem-profile.sh'
      - 'src/AiVM.Core/native/tests/parity_commands.txt'
      - 'src/AiVM.Core/native/tests/parity_commands_portable.txt'
      - 'src/AiVM.Core/native/tests/parity_commands_ci.txt'
      - 'src/AiVM.Core/native/tests/compiler_runtime_bench_baseline.tsv'
      - '.github/workflows/aivm-c-ci.yml'
  push:
    branches:
      - develop
      - main
    paths:
      - 'src/AiVM.Core/native/**'
      - 'scripts/test-aivm-c.sh'
      - 'scripts/test-aivm-c.ps1'
      - 'scripts/build-airun.sh'
      - 'scripts/build-airun.ps1'
      - 'scripts/aivm-parity-compare.sh'
      - 'scripts/aivm-dualrun-parity.sh'
      - 'scripts/aivm-dualrun-parity-manifest.sh'
      - 'scripts/aivm-dualrun-parity-manifest.ps1'
      - 'scripts/aivm-bench-gate.sh'
      - 'scripts/aivm-mem-audit.sh'
      - 'scripts/aivm-mem-audit.ps1'
      - 'scripts/aivm-mem-leak-check.sh'
      - 'scripts/aivm-mem-profile.sh'
      - 'src/AiVM.Core/native/tests/parity_commands.txt'
      - 'src/AiVM.Core/native/tests/parity_commands_portable.txt'
      - 'src/AiVM.Core/native/tests/parity_commands_ci.txt'
      - 'src/AiVM.Core/native/tests/compiler_runtime_bench_baseline.tsv'
      - '.github/workflows/aivm-c-ci.yml'

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure + build + test (Unix)
        if: runner.os != 'Windows'
        run: ./scripts/test-aivm-c.sh

      - name: Perf smoke (Linux)
        if: runner.os == 'Linux'
        run: AIVM_PERF_SMOKE=1 AIVM_PERF_RUNS=10 ./scripts/test-aivm-c.sh

      - name: Benchmark gate (Linux)
        if: runner.os == 'Linux'
        run: |
          ./scripts/build-airun.sh
          ./scripts/aivm-bench-gate.sh

      - name: Memory leak gate (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          ./scripts/build-airun.sh
          AIVM_MEM_AUDIT_REPORT=.tmp/aivm-mem-audit-${{ runner.os }}.toml \
          AIVM_LEAK_MAX_RSS_GROWTH_KB=2048 \
          ./scripts/aivm-mem-audit.sh ./src/AiVM.Core/native/tests/parity_cases/vm_c_execute_src_main_params.aos 20

      - name: Memory leak gate (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/build-airun.ps1
          $env:AIVM_MEM_AUDIT_REPORT = '.tmp/aivm-mem-audit-Windows.toml'
          $env:AIVM_LEAK_MAX_RSS_GROWTH_KB = '2048'
          ./scripts/aivm-mem-audit.ps1 .\src\AiVM.Core\native\tests\parity_cases\vm_c_execute_src_main_params.aos 20

      - name: Configure + build + test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/test-aivm-c.ps1

      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aivm-parity-artifacts-${{ matrix.os }}
          path: |
            .tmp/aivm-dualrun-manifest/report.txt
            .tmp/aivm-dualrun-manifest/*.left.out
            .tmp/aivm-dualrun-manifest/*.right.out
            .tmp/aivm-mem-audit-*.toml
          if-no-files-found: ignore
