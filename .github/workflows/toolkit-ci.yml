name: Toolkit CI

on:
  pull_request:
  push:
    branches:
      - develop
      - develope
      - "codex/**"

jobs:
  build-toolkit:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            frontend: aos_frontend
            airun: airun
          - os: macos-14
            frontend: aos_frontend
            airun: airun
          - os: windows-latest
            frontend: aos_frontend.exe
            airun: airun.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend parser (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./dist
          cc -std=c11 -O2 ./tools/aos_frontend.c -o "./dist/${{ matrix.frontend }}"
          chmod +x "./dist/${{ matrix.frontend }}"

      - name: Setup MSVC tools
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build frontend parser (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\dist | Out-Null
          cl /nologo /O2 /std:c11 /Fe:.\dist\${{ matrix.frontend }} .\tools\aos_frontend.c
          Remove-Item -Force .\aos_frontend.obj -ErrorAction SilentlyContinue

      - name: Stage runtime binary (if present, non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -x ./tools/airun ]]; then
            cp ./tools/airun "./dist/${{ matrix.airun }}"
          else
            printf 'airun runtime not yet produced in native CI\n' > ./dist/AIRUN_UNAVAILABLE.txt
          fi

      - name: Stage runtime binary (if present, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path .\tools\airun.exe) {
            Copy-Item .\tools\airun.exe .\dist\${{ matrix.airun }}
          } else {
            "airun runtime not yet produced in native CI" | Out-File .\dist\AIRUN_UNAVAILABLE.txt -Encoding utf8
          }

      - name: Stage compiler assets (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./dist/compiler
          cp ./src/compiler/*.aos ./dist/compiler/

      - name: Stage compiler assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\dist\compiler | Out-Null
          Copy-Item .\src\compiler\*.aos .\dist\compiler\

      - name: Upload toolkit artifact
        uses: actions/upload-artifact@v4
        with:
          name: toolkit-${{ matrix.os }}
          path: ./dist
