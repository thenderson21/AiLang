name: Toolkit CI

on:
  pull_request:
  push:
    branches:
      - develop
      - develope
      - "codex/**"

jobs:
  wasm-runtime-artifact:
    name: wasm-runtime-artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build wasm runtime artifact
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build-aivm-wasm.sh
          test -f ./.artifacts/aivm-wasm32/aivm-runtime-wasm32.wasm
          test -f ./.artifacts/aivm-wasm32/aivm-runtime-wasm32-web.wasm
          test -f ./.artifacts/aivm-wasm32/aivm-runtime-wasm32-web.mjs

      - name: Upload wasm runtime files
        uses: actions/upload-artifact@v4
        with:
          name: wasm-runtime-files
          path: ./.artifacts/aivm-wasm32

  build-toolkit:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs:
      - wasm-runtime-artifact
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            frontend: aos_frontend
            airun: airun
            runtime: aivm-runtime
          - os: macos-14
            frontend: aos_frontend
            airun: airun
            runtime: aivm-runtime
          - os: windows-latest
            frontend: aos_frontend.exe
            airun: airun.exe
            runtime: aivm-runtime.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download wasm runtime files
        uses: actions/download-artifact@v4
        with:
          name: wasm-runtime-files
          path: ./.artifacts/aivm-wasm32

      - name: Build airun runtime (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build-airun.sh
          test -x ./tools/airun

      - name: Setup MSVC tools
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build airun runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/build-airun.ps1
          if (-not (Test-Path .\tools\airun.exe)) { throw 'missing tools/airun.exe' }

      - name: Build frontend parser (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./dist
          cc -std=c11 -O2 ./tools/aos_frontend.c -o "./dist/${{ matrix.frontend }}"
          chmod +x "./dist/${{ matrix.frontend }}"

      - name: Build frontend parser (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\dist | Out-Null
          cl /nologo /O2 /std:c11 /Fe:.\dist\${{ matrix.frontend }} .\tools\aos_frontend.c
          Remove-Item -Force .\aos_frontend.obj -ErrorAction SilentlyContinue

      - name: Stage runtime binary (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cp ./tools/airun "./dist/${{ matrix.airun }}"
          cp ./tools/aivm-runtime "./dist/${{ matrix.runtime }}"

      - name: Stage runtime binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item .\tools\airun.exe .\dist\${{ matrix.airun }}
          Copy-Item .\tools\aivm-runtime.exe .\dist\${{ matrix.runtime }}

      - name: Stage compiler assets (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./dist/compiler
          cp ./src/compiler/*.aos ./dist/compiler/
          mkdir -p ./dist/.artifacts/aivm-wasm32
          cp ./.artifacts/aivm-wasm32/aivm-runtime-wasm32.wasm ./dist/.artifacts/aivm-wasm32/
          cp ./.artifacts/aivm-wasm32/aivm-runtime-wasm32-web.wasm ./dist/.artifacts/aivm-wasm32/
          cp ./.artifacts/aivm-wasm32/aivm-runtime-wasm32-web.mjs ./dist/.artifacts/aivm-wasm32/
          ./scripts/stage-sdk-docs.sh ./dist

      - name: Stage compiler assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\dist\compiler | Out-Null
          Copy-Item .\src\compiler\*.aos .\dist\compiler\
          New-Item -ItemType Directory -Force .\dist\.artifacts\aivm-wasm32 | Out-Null
          Copy-Item .\.artifacts\aivm-wasm32\aivm-runtime-wasm32.wasm .\dist\.artifacts\aivm-wasm32\
          Copy-Item .\.artifacts\aivm-wasm32\aivm-runtime-wasm32-web.wasm .\dist\.artifacts\aivm-wasm32\
          Copy-Item .\.artifacts\aivm-wasm32\aivm-runtime-wasm32-web.mjs .\dist\.artifacts\aivm-wasm32\
          .\scripts\stage-sdk-docs.ps1 .\dist

      - name: Upload toolkit artifact
        uses: actions/upload-artifact@v4
        with:
          name: toolkit-${{ matrix.os }}
          path: ./dist
